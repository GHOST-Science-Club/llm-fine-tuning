task: benchmark
dataset_path: json
dataset_name: null
dataset_kwargs:
  data_files:
    test: benchmark.jsonl
test_split: test
doc_to_text: "Rozwiąż zadanie matematyczne. Przedstaw swój tok rozumowania, a na samym końcu podaj ostateczną odpowiedź w formacie \boxed{{ '{{' }}wynik{{ '}}' }}.\n\nZadanie: {{ task }}"
doc_to_target: "{{answer}}"
generation_kwargs:
  max_gen_toks: 4096
  temperature: 0.0
  do_sample: false
  until:
    - "</s>"
    - "<|im_end|>"
metric_list:
  - metric: math_verify_metric
    aggregation: math_verify_metric
    higher_is_better: true